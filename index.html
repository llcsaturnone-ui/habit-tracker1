<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>Трекер Дисциплины</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-touch-callout: none; /* Убирает всплывающее меню и лупу при долгом нажатии */
            -webkit-user-select: none;   /* Блокирует выделение текста */
            user-select: none;
        }

        /* Возвращаем возможность писать текст в полях ввода */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        html, body, #root { 
            height: 100%; 
            width: 100%;
            overflow: hidden;
            background: #4f46e5; /* Фон под шторкой (синий) */
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { display: none; }

        /* Плавная анимация колец прогресса */
        .circle-progress {
            transition: stroke-dashoffset 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        const HabitTracker = () => {
            const initialHabits = [
                { id: '1', name: 'Фаджр (Утренний)', parentId: null, customPrice: null },
                { id: '1-sub', name: 'Зикр после Фаджра', parentId: '1', customPrice: null },
                { id: '2', name: 'Зухр (Обеденный)', parentId: null, customPrice: null },
                { id: '2-sub', name: 'Зикр после Зухра', parentId: '2', customPrice: null },
                { id: '3', name: 'Аср (Предвечерний)', parentId: null, customPrice: null },
                { id: '3-sub', name: 'Зикр после Асра', parentId: '3', customPrice: null },
                { id: '4', name: 'Магриб (Вечерний)', parentId: null, customPrice: null },
                { id: '4-sub', name: 'Зикр после Магриба', parentId: '4', customPrice: null },
                { id: '5', name: 'Иша (Ночной)', parentId: null, customPrice: null },
                { id: '5-sub', name: 'Зикр после Иша', parentId: '5', customPrice: null },
            ];

            const [activeTab, setActiveTab] = useState('tracker'); 
            const [budget, setBudget] = useState(10000);
            const [habits, setHabits] = useState(initialHabits);
            const [records, setRecords] = useState({});
            const [shopItems, setShopItems] = useState([]);
            
            const [tasbihCount, setTasbihCount] = useState(0);
            const audioCtxRef = useRef(null);

            const todayString = new Date().toISOString().split('T')[0];
            const [currentDate, setCurrentDate] = useState(() => todayString);
            
            const [newHabitName, setNewHabitName] = useState('');
            const [addingSubTo, setAddingSubTo] = useState(null);
            const [newSubName, setNewSubName] = useState('');
            const [newItemName, setNewItemName] = useState('');
            const [newItemPrice, setNewItemPrice] = useState('');

            const [touchStartX, setTouchStartX] = useState(null);

            // Состояния для долгого нажатия сброса
            const [resetProgress, setResetProgress] = useState(0);
            const holdAnimRef = useRef(null);
            const holdStartRef = useRef(0);

            useEffect(() => {
                const savedData = localStorage.getItem('islamicHabitTrackerLightV1');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    setBudget(parsed.budget || 10000);
                    setHabits(parsed.habits && parsed.habits.length > 0 ? parsed.habits : initialHabits);
                    setRecords(parsed.records || {});
                    setShopItems(parsed.shopItems || []);
                    setTasbihCount(parsed.tasbihCount || 0);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('islamicHabitTrackerLightV1', JSON.stringify({ budget, habits, records, shopItems, tasbihCount }));
            }, [budget, habits, records, shopItems, tasbihCount]);

            const totalHabits = habits.length;
            const standardPrice = totalHabits > 0 ? (budget / (totalHabits * 7)) : 0;
            const getHabitBasePrice = (habit) => habit.customPrice !== null && habit.customPrice !== '' ? parseFloat(habit.customPrice) : standardPrice;

            const getHabitStats = (habitId, date) => {
                let streakBefore = 0;
                let d = new Date(date);
                d.setDate(d.getDate() - 1); 
                for (let i = 0; i < 365; i++) {
                    const dateStr = d.toISOString().split('T')[0];
                    if (records[`${dateStr}_${habitId}`]?.status === 'done') {
                        streakBefore++;
                        d.setDate(d.getDate() - 1);
                    } else break; 
                }
                const bonusPercent = Math.floor(streakBefore / 7) * 10;
                return { streakBefore, bonusPercent, multiplier: 1 + (bonusPercent / 100) };
            };

            const totalEarnedAndFined = Object.values(records).reduce((sum, record) => sum + record.amount, 0);
            const totalSpent = shopItems.filter(item => item.isBought).reduce((sum, item) => sum + item.price, 0);
            const currentBalance = totalEarnedAndFined - totalSpent;

            const formatMoney = (val) => Number(val).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
            const formatDateHeader = (dateStr) => {
                if (dateStr === todayString) return 'Сегодня';
                const d = new Date(dateStr);
                return `${d.getDate()} ${d.toLocaleDateString('ru-RU', { month: 'long' })}, ${d.toLocaleDateString('ru-RU', { weekday: 'short' }).charAt(0).toUpperCase() + d.toLocaleDateString('ru-RU', { weekday: 'short' }).slice(1)}`;
            };

            const handleMarkHabit = (habit, status) => {
                const stats = getHabitStats(habit.id, currentDate);
                const basePrice = getHabitBasePrice(habit);
                const amount = status === 'done' ? Math.round(basePrice * stats.multiplier) : -Math.round(basePrice * 3);
                setRecords(prev => ({ ...prev, [`${currentDate}_${habit.id}`]: { status, amount } }));
            };

            const handleUndoHabit = (habitId) => {
                setRecords(prev => { const newRecords = { ...prev }; delete newRecords[`${currentDate}_${habitId}`]; return newRecords; });
            };

            const shiftDate = (days) => {
                const d = new Date(currentDate); d.setDate(d.getDate() + days); setCurrentDate(d.toISOString().split('T')[0]);
            };

            const handleTouchStart = (e) => { setTouchStartX(e.targetTouches[0].clientX); };
            const handleTouchEnd = (e) => {
                if (touchStartX === null) return;
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                if (diff > 50) shiftDate(1);
                else if (diff < -50) shiftDate(-1);
                setTouchStartX(null);
            };

            const handleAddItem = () => {
                if (newItemName.trim() && newItemPrice > 0) {
                    setShopItems([...shopItems, { id: Date.now().toString(), name: newItemName.trim(), price: Number(newItemPrice), isBought: false }]);
                    setNewItemName(''); setNewItemPrice('');
                }
            };
            const handleBuyItem = (item) => currentBalance >= item.price ? setShopItems(shopItems.map(i => i.id === item.id ? { ...i, isBought: true } : i)) : alert('Недостаточно средств!');
            const handleDeleteItem = (id) => setShopItems(shopItems.filter(i => i.id !== id));
            const handleDuplicateItem = (item) => setShopItems([...shopItems, { id: Date.now().toString(), name: item.name, price: item.price, isBought: false }]);

            const handleAddMainHabit = () => { if (newHabitName.trim()) { setHabits([...habits, { id: Date.now().toString(), name: newHabitName.trim(), parentId: null, customPrice: null }]); setNewHabitName(''); }};
            const handleAddSubHabit = (parentId) => { if (newSubName.trim()) { setHabits([...habits, { id: Date.now().toString(), name: newSubName.trim(), parentId, customPrice: null }]); setNewSubName(''); setAddingSubTo(null); }};
            const handleDeleteHabit = (id) => setHabits(habits.filter(h => h.id !== id && h.parentId !== id));
            const handleCustomPriceChange = (id, value) => setHabits(habits.map(h => h.id === id ? { ...h, customPrice: value === '' ? null : value } : h));

            // Синтезатор звука (Приятные звуки)
            const playSound = (isSpecial) => {
                try {
                    if (!audioCtxRef.current) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        audioCtxRef.current = new AudioContext();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') ctx.resume();

                    if (isSpecial) {
                        // Приятный мажорный перезвон (ноты До и Ми)
                        const osc1 = ctx.createOscillator();
                        const gain1 = ctx.createGain();
                        osc1.type = 'sine';
                        osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                        gain1.gain.setValueAtTime(0, ctx.currentTime);
                        gain1.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
                        gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                        osc1.connect(gain1);
                        gain1.connect(ctx.destination);
                        osc1.start(ctx.currentTime);
                        osc1.stop(ctx.currentTime + 0.5);

                        const osc2 = ctx.createOscillator();
                        const gain2 = ctx.createGain();
                        osc2.type = 'sine';
                        osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5 (с микро-задержкой)
                        gain2.gain.setValueAtTime(0, ctx.currentTime + 0.1);
                        gain2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.15);
                        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                        osc2.connect(gain2);
                        gain2.connect(ctx.destination);
                        osc2.start(ctx.currentTime + 0.1);
                        osc2.stop(ctx.currentTime + 0.6);
                    } else {
                        // Мягкий звук "капли" для обычного клика
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        
                        // Быстрый спад частоты создает эффект капли/щелчка
                        osc.frequency.setValueAtTime(400, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.05);
                        
                        gain.gain.setValueAtTime(0, ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.01);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.1);
                    }
                } catch (e) {
                    console.error("Audio error:", e);
                }
            };

            const handleTasbihTap = (e) => {
                let newCount = tasbihCount + 1;
                if (newCount > 99) newCount = 1; 
                const isSpecial = newCount === 33 || newCount === 66 || newCount === 99;

                playSound(isSpecial);

                if (navigator.vibrate) {
                    if (isSpecial) navigator.vibrate([100, 50, 100]); 
                    else navigator.vibrate(10); 
                }

                setTasbihCount(newCount);
            };

            // Логика долгого удержания кнопки сброса
            const startResetHold = (e) => {
                e.stopPropagation();
                if (navigator.vibrate) navigator.vibrate(15);
                holdStartRef.current = Date.now();
                
                const animate = () => {
                    const elapsed = Date.now() - holdStartRef.current;
                    const progress = Math.min((elapsed / 3000) * 100, 100); // 3 секунды удержания для комфорта
                    setResetProgress(progress);
                    
                    if (progress >= 100) {
                        setTasbihCount(0);
                        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                        setResetProgress(0);
                        cancelAnimationFrame(holdAnimRef.current);
                    } else {
                        holdAnimRef.current = requestAnimationFrame(animate);
                    }
                };
                holdAnimRef.current = requestAnimationFrame(animate);
            };

            const stopResetHold = (e) => {
                if (e) e.stopPropagation();
                cancelAnimationFrame(holdAnimRef.current);
                setResetProgress(0);
            };

            const StatusBar = ({ habitId }) => {
                const days = [];
                const currDateObj = new Date(currentDate);
                const currentDayOfWeek = currDateObj.getDay(); 
                const diffToMonday = currentDayOfWeek === 0 ? 6 : currentDayOfWeek - 1;
                const monday = new Date(currDateObj); monday.setDate(monday.getDate() - diffToMonday);
                for(let i = 0; i < 7; i++) {
                    const d = new Date(monday); d.setDate(d.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    days.push({ status: records[`${dateStr}_${habitId}`]?.status, dayName: d.toLocaleDateString('ru-RU', { weekday: 'short' }), isSelectedDay: dateStr === currentDate });
                }
                return (
                    <div className="flex space-x-[4px]">
                        {days.map((day, idx) => (
                            <div key={idx} className="flex flex-col items-center gap-[2px] w-[18px]">
                                <div className={`w-full h-2 rounded-[2px] transition-colors ${day.status === 'done' ? 'bg-emerald-500' : day.status === 'missed' ? 'bg-red-500' : 'bg-gray-200'}`} />
                                <span className={`text-[7px] uppercase font-bold tracking-wider leading-none ${day.isSelectedDay ? 'text-indigo-600' : 'text-gray-400'}`}>{day.dayName}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            const HabitRow = ({ habit, isSub }) => {
                const record = records[`${currentDate}_${habit.id}`];
                const basePrice = getHabitBasePrice(habit);
                const stats = getHabitStats(habit.id, currentDate);
                const currentStreakDisplay = record?.status === 'done' ? stats.streakBefore + 1 : stats.streakBefore;
                const activeBonus = record?.status === 'done' ? Math.floor((stats.streakBefore + 1) / 7) * 10 : stats.bonusPercent;
                return (
                    <div className={`px-3 py-2.5 flex transition-colors ${record?.status === 'done' ? 'bg-emerald-50/40' : record?.status === 'missed' ? 'bg-red-50/40' : 'bg-white hover:bg-gray-50'} ${isSub ? 'pl-7 relative' : ''}`}>
                        {isSub && <div className="absolute left-2.5 top-3.5 text-gray-300"><Icon name="corner-down-right" className="w-4 h-4" /></div>}
                        <div className="flex-1 flex flex-col justify-center min-w-0 pr-3 space-y-1">
                            <div className="flex items-center space-x-2 overflow-hidden">
                                <span className={`truncate text-gray-800 ${isSub ? 'text-[14px] font-medium' : 'text-[15px] font-bold'}`}>{habit.name}</span>
                                {currentStreakDisplay > 0 && <span className={`flex items-center shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded-md ${activeBonus > 0 ? 'bg-orange-100 text-orange-600' : 'bg-gray-100 text-gray-500'}`}><Icon name="flame" className="w-3 h-3 mr-0.5" /> {currentStreakDisplay}</span>}
                            </div>
                            <div className="flex items-end space-x-4">
                                <StatusBar habitId={habit.id} />
                                <div className="flex items-center space-x-2 text-[10px] uppercase tracking-wide pb-[1px]">
                                    <span className="text-emerald-500 font-extrabold">+{formatMoney(basePrice * stats.multiplier)}</span>
                                    <span className="text-red-400 font-extrabold">-{formatMoney(basePrice * 3)}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2 shrink-0">
                            {!record ? (
                                <>
                                    <button onClick={() => handleMarkHabit(habit, 'done')} className="flex items-center justify-center px-4 py-2 bg-emerald-100 text-emerald-600 rounded-xl hover:bg-emerald-200 active:bg-emerald-300 active:scale-95 transition-all duration-150">
                                        <Icon name="circle-check" className="w-6 h-6" />
                                    </button>
                                    <button onClick={() => handleMarkHabit(habit, 'missed')} className="flex items-center justify-center px-4 py-2 bg-red-100 text-red-500 rounded-xl hover:bg-red-200 active:bg-red-300 active:scale-95 transition-all duration-150">
                                        <Icon name="circle-x" className="w-6 h-6" />
                                    </button>
                                </>
                            ) : (
                                <button onClick={() => handleUndoHabit(habit.id)} className="flex items-center justify-center px-5 py-2.5 bg-gray-100 text-gray-500 rounded-xl hover:bg-gray-200 active:bg-gray-300 active:scale-95 transition-all duration-150 text-[11px] font-bold uppercase">
                                    <Icon name="undo-2" className="w-4 h-4 mr-1.5" /> Отмена
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderTracker = () => {
                const mainHabits = habits.filter(h => !h.parentId);
                return (
                    <div className="space-y-2 pb-2">
                        {mainHabits.length === 0 ? <p className="text-center text-gray-500 py-8 text-sm">Привычек нет.</p> : mainHabits.map(mainHabit => (
                            <div key={mainHabit.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                <HabitRow habit={mainHabit} isSub={false} />
                                {habits.filter(h => h.parentId === mainHabit.id).length > 0 && (
                                    <div className="border-t border-gray-50 bg-gray-50/20">
                                        {habits.filter(h => h.parentId === mainHabit.id).map((sub, index) => <div key={sub.id} className={index !== 0 ? 'border-t border-gray-50' : ''}><HabitRow habit={sub} isSub={true} /></div>)}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                );
            };

            const renderShop = () => (
                <div className="space-y-3 pb-4">
                    <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-3 text-center">
                        <p className="text-indigo-800 text-[11px] font-bold uppercase tracking-wider mb-0.5">Доступно для покупок</p>
                        <div className="text-2xl font-extrabold text-indigo-600">{formatMoney(currentBalance)}</div>
                    </div>
                    <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="text-xs font-bold text-gray-800 mb-2 flex items-center"><Icon name="plus" className="w-3.5 h-3.5 mr-1.5 text-indigo-500"/> Добавить цель</h3>
                        <div className="flex space-x-1.5">
                            <input type="text" value={newItemName} onChange={(e) => setNewItemName(e.target.value)} placeholder="Название" className="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none text-[16px]" />
                            <input type="number" value={newItemPrice} onChange={(e) => setNewItemPrice(e.target.value)} placeholder="Цена ₽" className="w-20 p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none text-[16px] text-center" />
                            <button onClick={handleAddItem} className="bg-indigo-600 text-white p-2 rounded-lg flex justify-center items-center"><Icon name="plus" className="w-5 h-5" /></button>
                        </div>
                    </div>
                    <div className="space-y-1.5">
                        {shopItems.length === 0 ? <p className="text-center text-gray-500 text-xs py-4">Магазин пуст.</p> : shopItems.map(item => (
                            <div key={item.id} className={`flex items-center justify-between p-2.5 rounded-lg border ${item.isBought ? 'bg-gray-50 border-gray-200 opacity-70' : 'bg-white shadow-sm'}`}>
                                <div className="flex flex-col overflow-hidden pr-2">
                                    <span className={`font-semibold text-xs truncate ${item.isBought ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{item.name}</span>
                                    <span className={`text-[10px] font-bold ${item.isBought ? 'text-gray-400' : 'text-indigo-600'}`}>{formatMoney(item.price)}</span>
                                </div>
                                <div className="flex items-center space-x-1 shrink-0">
                                    {!item.isBought ? (
                                        <button onClick={() => handleBuyItem(item)} disabled={currentBalance < item.price} className={`px-2.5 py-1.5 rounded-md text-[10px] font-bold flex items-center uppercase justify-center mr-1 ${currentBalance >= item.price ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-400'}`}><Icon name="shopping-bag" className="w-3 h-3 mr-1" /> Купить</button>
                                    ) : (
                                        <span className="px-2 py-1 bg-gray-200 text-gray-600 rounded-md text-[9px] font-bold uppercase tracking-wider flex items-center justify-center mr-1"><Icon name="circle-check" className="w-3 h-3 mr-1" /> Куплено</span>
                                    )}
                                    <button onClick={() => handleDuplicateItem(item)} className="p-1.5 text-gray-400 hover:text-indigo-500 flex justify-center items-center rounded-md hover:bg-gray-100 transition-colors"><Icon name="copy" className="w-4 h-4" /></button>
                                    <button onClick={() => handleDeleteItem(item.id)} className="p-1.5 text-gray-400 hover:text-red-500 flex justify-center items-center rounded-md hover:bg-red-50 transition-colors"><Icon name="trash-2" className="w-4 h-4" /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderSettings = () => {
                const mainHabits = habits.filter(h => !h.parentId);
                return (
                    <div className="space-y-3 pb-4">
                        <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-xs font-bold text-gray-800 mb-2 flex items-center"><Icon name="wallet" className="w-3.5 h-3.5 mr-1.5 text-indigo-500"/> Бюджет</h3>
                            <div className="space-y-2">
                                <div><label className="block text-[10px] font-bold uppercase text-gray-500 mb-1">На 7 дней (₽)</label><input type="number" value={budget} onChange={(e) => setBudget(Number(e.target.value))} className="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg outline-none text-[16px]" /></div>
                                <div className="bg-indigo-50 p-2 rounded-lg flex justify-between items-center text-indigo-900"><span className="font-semibold text-[10px] uppercase">Цена по умолчанию:</span><span className="font-bold text-sm">{formatMoney(standardPrice)}</span></div>
                            </div>
                        </div>
                        <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-xs font-bold text-gray-800 mb-2 flex items-center"><Icon name="settings" className="w-3.5 h-3.5 mr-1.5 text-indigo-500"/> Привычки</h3>
                            <div className="flex space-x-1.5 mb-3">
                                <input type="text" value={newHabitName} onChange={(e) => setNewHabitName(e.target.value)} placeholder="Новая привычка..." className="flex-1 p-2 bg-gray-50 border rounded-lg outline-none text-[16px]" onKeyDown={(e) => e.key === 'Enter' && handleAddMainHabit()} />
                                <button onClick={handleAddMainHabit} className="bg-indigo-600 text-white p-2 rounded-lg flex justify-center items-center"><Icon name="plus" className="w-5 h-5" /></button>
                            </div>
                            <div className="space-y-1.5">
                                {mainHabits.map((main) => (
                                    <div key={main.id} className="space-y-1">
                                        <div className="flex items-center space-x-1.5 p-2 bg-gray-50 rounded-lg border border-gray-100">
                                            <span className="flex-1 font-semibold text-[12px] truncate">{main.name}</span>
                                            <div className="flex items-center space-x-1 shrink-0">
                                                <div className="flex flex-col w-16">
                                                    <span className="text-[7px] text-gray-500 uppercase font-bold tracking-widest mb-0.5 text-center">Своя ₽</span>
                                                    <input type="number" placeholder={Math.round(standardPrice)} value={main.customPrice || ''} onChange={(e) => handleCustomPriceChange(main.id, e.target.value)} className="w-full h-7 text-[16px] border rounded outline-none text-center" />
                                                </div>
                                                <button onClick={() => handleDeleteHabit(main.id)} className="p-1 text-red-400 mt-2.5 flex justify-center items-center"><Icon name="trash-2" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                        
                                        {habits.filter(h => h.parentId === main.id).map(sub => 
                                        <div key={sub.id} className="flex items-center space-x-1.5 p-1.5 ml-3 bg-gray-50/50 border-l-2 border-l-indigo-200">
                                            <span className="flex-1 font-medium text-[12px] truncate">{sub.name}</span>
                                            <div className="flex items-center space-x-1 shrink-0">
                                                <div className="flex flex-col w-16">
                                                    <span className="text-[7px] text-gray-500 uppercase font-bold tracking-widest mb-0.5 text-center">Своя ₽</span>
                                                    <input type="number" placeholder={Math.round(standardPrice)} value={sub.customPrice || ''} onChange={(e) => handleCustomPriceChange(sub.id, e.target.value)} className="w-full h-7 text-[16px] border rounded outline-none text-center" />
                                                </div>
                                                <button onClick={() => handleDeleteHabit(sub.id)} className="p-1 text-red-400 mt-2.5 flex justify-center items-center"><Icon name="trash-2" className="w-4 h-4" /></button>
                                            </div>
                                        </div>)}
                                        
                                        {addingSubTo === main.id ? 
                                        <div className="ml-3 flex space-x-1 mt-1">
                                            <input autoFocus type="text" value={newSubName} onChange={(e) => setNewSubName(e.target.value)} placeholder="Название..." className="flex-1 h-7 text-[16px] border rounded outline-none px-2" onKeyDown={(e) => e.key === 'Enter' && handleAddSubHabit(main.id)} />
                                            <button onClick={() => handleAddSubHabit(main.id)} className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded h-7 text-[11px] font-bold">OK</button>
                                            <button onClick={() => setAddingSubTo(null)} className="bg-gray-100 text-gray-500 px-3 py-1 rounded h-7 text-[11px]">Отмена</button>
                                        </div> : 
                                        <button onClick={() => setAddingSubTo(main.id)} className="ml-3 text-[10px] text-indigo-500 font-bold uppercase flex items-center py-0.5 hover:text-indigo-700"><Icon name="corner-down-right" className="w-3 h-3 mr-1" /> Подпривычка</button>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTasbih = () => {
                const size = 260;
                const strokeWidth = 14;
                const center = size / 2;
                
                const radius99 = (size - strokeWidth) / 2;
                const circ99 = 2 * Math.PI * radius99;
                const offset99 = circ99 - (tasbihCount / 99) * circ99;

                const radius33 = radius99 - strokeWidth - 8;
                const circ33 = 2 * Math.PI * radius33;
                const count33 = tasbihCount === 0 ? 0 : ((tasbihCount - 1) % 33) + 1;
                const offset33 = circ33 - (count33 / 33) * circ33;

                return (
                    <div 
                        className="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 cursor-pointer active:bg-gray-100 transition-colors"
                        onClick={handleTasbihTap}
                    >
                        <div className="relative flex items-center justify-center pointer-events-none" style={{ width: size, height: size }}>
                            <svg width={size} height={size} className="transform -rotate-90 drop-shadow-xl">
                                <circle cx={center} cy={center} r={radius99} fill="transparent" stroke="#e0e7ff" strokeWidth={strokeWidth} />
                                <circle cx={center} cy={center} r={radius33} fill="transparent" stroke="#e0e7ff" strokeWidth={strokeWidth} />
                                
                                <circle 
                                    className="circle-progress" cx={center} cy={center} r={radius99} 
                                    fill="transparent" stroke="#4f46e5" strokeWidth={strokeWidth} strokeLinecap="round"
                                    strokeDasharray={circ99} strokeDashoffset={offset99}
                                />
                                <circle 
                                    className="circle-progress" cx={center} cy={center} r={radius33} 
                                    fill="transparent" stroke="#0ea5e9" strokeWidth={strokeWidth} strokeLinecap="round"
                                    strokeDasharray={circ33} strokeDashoffset={offset33}
                                />
                            </svg>

                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                <span className="text-[5.5rem] font-extrabold text-indigo-900 tracking-tighter leading-none mt-2">
                                    {tasbihCount}
                                </span>
                                <div className="flex flex-col items-center mt-2">
                                    <span className="text-xs font-bold text-sky-600 bg-sky-50 px-2 py-0.5 rounded-full">{count33} / 33</span>
                                </div>
                            </div>
                        </div>

                        <span className="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest pointer-events-none">
                            Нажмите в любом месте экрана
                        </span>
                        
                        {/* Кнопка сброса с защитой (удерживание) */}
                        <div className="absolute bottom-8 z-10 flex flex-col items-center">
                            <button 
                                onPointerDown={startResetHold}
                                onPointerUp={stopResetHold}
                                onPointerLeave={stopResetHold}
                                onPointerCancel={stopResetHold}
                                className="relative overflow-hidden flex items-center justify-center px-6 py-3 bg-white text-gray-500 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.05)] border border-gray-200 text-[10px] font-bold uppercase tracking-wider"
                            >
                                <div 
                                    className="absolute left-0 top-0 bottom-0 bg-red-100/50 pointer-events-none"
                                    style={{ width: `${resetProgress}%` }}
                                ></div>
                                
                                <div className="relative z-10 flex items-center">
                                    <Icon name="rotate-ccw" className={`w-3.5 h-3.5 mr-1.5 ${resetProgress > 0 ? 'text-red-500' : 'text-indigo-400'}`} />
                                    <span className={resetProgress > 0 ? 'text-red-600' : ''}>
                                        {resetProgress > 0 ? 'Удерживайте...' : 'Сброс'}
                                    </span>
                                </div>
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full w-full bg-gray-50 font-sans text-gray-900 flex justify-center">
                    <div className="w-full max-w-md flex flex-col h-full overflow-hidden">
                        
                        <header className="shrink-0 bg-indigo-600 text-white pb-3 px-4 pt-3 shadow-md rounded-b-[1.25rem] z-20">
                            <div 
                                className="flex items-center justify-between mb-2 h-7"
                                onTouchStart={handleTouchStart}
                                onTouchEnd={handleTouchEnd}
                            >
                                {activeTab === 'tracker' ? (
                                    <><button onClick={() => shiftDate(-1)} className="p-1 bg-white/10 rounded-md flex justify-center items-center"><Icon name="chevron-left" className="w-4 h-4 text-white" /></button><h1 className="text-[15px] font-bold tracking-wide">{formatDateHeader(currentDate)}</h1><button onClick={() => shiftDate(1)} className="p-1 bg-white/10 rounded-md flex justify-center items-center"><Icon name="chevron-right" className="w-4 h-4 text-white" /></button></>
                                ) : <h1 className="text-[15px] font-bold tracking-wide text-center w-full">
                                    {activeTab === 'shop' ? 'Магазин Наград' : activeTab === 'settings' ? 'Настройки' : 'Тасбих'}
                                </h1>}
                            </div>
                            
                            {/* Блок баланса теперь показывается на всех вкладках для сохранения одинаковой высоты шапки */}
                            <div className="bg-white/10 rounded-[0.85rem] p-2.5 border border-white/20">
                                <p className="text-indigo-100 text-[9px] font-bold mb-0.5 uppercase tracking-widest opacity-80">Доступно</p>
                                <div className="flex items-center space-x-1.5">
                                    <span className="text-[22px] font-extrabold tracking-tight leading-none">{formatMoney(currentBalance)}</span>
                                    {currentBalance >= 0 ? <Icon name="trending-up" className="w-4 h-4 text-emerald-300" /> : <Icon name="trending-down" className="w-4 h-4 text-red-300" />}
                                </div>
                                <div className="mt-2 pt-1.5 border-t border-white/10 flex justify-between text-[10px]">
                                    <div><p className="text-indigo-200 text-[8px] uppercase font-bold tracking-widest opacity-70">Заработано</p><p className="font-semibold text-emerald-300">{formatMoney(totalEarnedAndFined)}</p></div>
                                    <div className="text-right"><p className="text-indigo-200 text-[8px] uppercase font-bold tracking-widest opacity-70">Потрачено</p><p className="font-semibold text-orange-200">{formatMoney(totalSpent)}</p></div>
                                </div>
                            </div>
                        </header>
                        
                        <main className="flex-1 overflow-y-auto px-2 pt-2 relative">
                            {activeTab === 'tracker' && renderTracker()}
                            {activeTab === 'shop' && renderShop()}
                            {activeTab === 'settings' && renderSettings()}
                            {activeTab === 'tasbih' && renderTasbih()}
                        </main>

                        <nav className="shrink-0 w-full bg-white border-t border-gray-200 z-20 px-2 pt-1.5 pb-7">
                            <div className="flex justify-around items-center">
                                <button onClick={() => setActiveTab('tracker')} className={`flex-1 flex flex-col items-center justify-center py-1 space-y-[2px] ${activeTab === 'tracker' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                    <Icon name="circle-check" className="w-[20px] h-[20px]" />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">Трекер</span>
                                </button>
                                <button onClick={() => setActiveTab('shop')} className={`flex-1 flex flex-col items-center justify-center py-1 space-y-[2px] ${activeTab === 'shop' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                    <Icon name="store" className="w-[20px] h-[20px]" />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">Магазин</span>
                                </button>
                                <button onClick={() => setActiveTab('tasbih')} className={`flex-1 flex flex-col items-center justify-center py-1 space-y-[2px] ${activeTab === 'tasbih' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                    <Icon name="target" className="w-[20px] h-[20px]" />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">Тасбих</span>
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`flex-1 flex flex-col items-center justify-center py-1 space-y-[2px] ${activeTab === 'settings' ? 'text-indigo-600' : 'text-gray-400'}`}>
                                    <Icon name="settings" className="w-[20px] h-[20px]" />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">Настройки</span>
                                </button>
                            </div>
                        </nav>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HabitTracker />);
    </script>
</body>
</html>
