// ─── Helpers ───
const LS_KEY = ‘habitbank_v3’;
const getToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const parseDate = (s) => { const [y,m,d] = s.split(’-’).map(Number); return new Date(y, m-1, d); };
const addDays = (s, n) => { const d = parseDate(s); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const formatDate = (s) => { const d = parseDate(s); const days = [‘Вс’,‘Пн’,‘Вт’,‘Ср’,‘Чт’,‘Пт’,‘Сб’]; const months = [‘янв’,‘фев’,‘мар’,‘апр’,‘мая’,‘июн’,‘июл’,‘авг’,‘сен’,‘окт’,‘ноя’,‘дек’]; return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`; };
const getMonday = (dateStr) => { const d = parseDate(dateStr); const day = d.getDay(); const diff = day === 0 ? -6 : 1 - day; d.setDate(d.getDate() + diff); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const uid = () => Math.random().toString(36).substr(2,9);

const defaultHabits = [
{ id: uid(), name: ‘Фаджр (Утренний)’, parentId: null, customPrice: null, order: 0 },
{ id: uid(), name: ‘Зикр после Фаджра’, parentId: null, customPrice: null, order: 1 },
{ id: uid(), name: ‘Зухр (Обеденный)’, parentId: null, customPrice: null, order: 2 },
{ id: uid(), name: ‘Зикр после Зухра’, parentId: null, customPrice: null, order: 3 },
{ id: uid(), name: ‘Аср (Предвечерний)’, parentId: null, customPrice: null, order: 4 },
{ id: uid(), name: ‘Зикр после Асра’, parentId: null, customPrice: null, order: 5 },
{ id: uid(), name: ‘Магриб (Вечерний)’, parentId: null, customPrice: null, order: 6 },
{ id: uid(), name: ‘Зикр после Магриба’, parentId: null, customPrice: null, order: 7 },
{ id: uid(), name: ‘Иша (Ночной)’, parentId: null, customPrice: null, order: 8 },
{ id: uid(), name: ‘Зикр после Иша’, parentId: null, customPrice: null, order: 9 },
];
// Set parent relationships
defaultHabits[1].parentId = defaultHabits[0].id;
defaultHabits[3].parentId = defaultHabits[2].id;
defaultHabits[5].parentId = defaultHabits[4].id;
defaultHabits[7].parentId = defaultHabits[6].id;
defaultHabits[9].parentId = defaultHabits[8].id;

const defaultState = { budget: 10000, habits: defaultHabits, log: {}, shop: [], balance: 0 };

function loadState() {
try { const s = localStorage.getItem(LS_KEY); return s ? { …defaultState, …JSON.parse(s) } : { …defaultState }; }
catch { return { …defaultState }; }
}
function saveState(state) { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// ─── Price Calculation ───
function calcPrices(habits, budget) {
const total = habits.length;
const basePrice = total > 0 ? budget / (total * 7) : 0;
const prices = {};
habits.forEach(h => { prices[h.id] = h.customPrice != null ? h.customPrice : Math.round(basePrice * 100) / 100; });
return prices;
}

// ─── Streak Calculation ───
function calcStreak(habitId, log, upToDate) {
let streak = 0;
let d = upToDate;
for (let i = 0; i < 365; i++) {
const key = `${habitId}_${d}`;
if (log[key] === ‘done’) { streak++; d = addDays(d, -1); }
else break;
}
return streak;
}

function calcStreakBonus(streak) {
const weeks = Math.floor(streak / 7);
return weeks * 0.10; // 10% per full week
}

// ─── Recalc Balance ───
function recalcBalance(habits, log, budget) {
const prices = calcPrices(habits, budget);
let balance = 0;
Object.entries(log).forEach(([key, val]) => {
const [hid, date] = [key.substring(0, key.lastIndexOf(’*’)), key.substring(key.lastIndexOf(’*’) + 1)];
const price = prices[hid] || 0;
if (val === ‘done’) {
const streak = calcStreak(hid, log, addDays(date, -1)) + 1;
const bonus = calcStreakBonus(streak);
balance += Math.round(price * (1 + bonus) * 100) / 100;
} else if (val === ‘miss’) {
balance -= Math.round(price * 3 * 100) / 100;
}
});
return Math.round(balance * 100) / 100;
}

// ─── Main App ───
function App() {
const [state, setState] = useState(loadState);
const [tab, setTab] = useState(0);
const [date, setDate] = useState(getToday());

useEffect(() => { saveState(state); }, [state]);

const prices = useMemo(() => calcPrices(state.habits, state.budget), [state.habits, state.budget]);
const balance = useMemo(() => recalcBalance(state.habits, state.log, state.budget), [state.habits, state.log, state.budget]);

const setLog = useCallback((habitId, dateStr, val) => {
setState(prev => {
const newLog = { …prev.log };
const key = `${habitId}_${dateStr}`;
if (val === null) delete newLog[key];
else newLog[key] = val;
return { …prev, log: newLog };
});
}, []);

const purchaseItem = useCallback((itemId) => {
setState(prev => {
const item = prev.shop.find(i => i.id === itemId);
if (!item || item.bought) return prev;
const bal = recalcBalance(prev.habits, prev.log, prev.budget);
if (bal < item.price) return prev;
// Add a phantom penalty to the log to deduct balance
const newLog = { …prev.log };
newLog[`_purchase_${itemId}_${Date.now()}`] = { type: ‘purchase’, amount: item.price };
return { …prev, shop: prev.shop.map(i => i.id === itemId ? { …i, bought: true } : i), log: newLog };
});
}, []);

// Recalc balance with purchases
const realBalance = useMemo(() => {
let b = balance;
Object.entries(state.log).forEach(([k, v]) => {
if (v && typeof v === ‘object’ && v.type === ‘purchase’) b -= v.amount;
});
return Math.round(b * 100) / 100;
}, [balance, state.log]);

return (
<div className=“flex flex-col h-full bg-gray-50” style={{ paddingTop: ‘env(safe-area-inset-top)’ }}>
{/* Header */}
<div className=“bg-brand-600 text-white shrink-0” style={{ paddingTop: ‘env(safe-area-inset-top)’ }}>
<div className="flex items-center justify-between px-3 py-1.5">
<span className="font-extrabold text-sm tracking-tight">HabitBank</span>
<span className=“mono text-xs font-semibold px-2 py-0.5 rounded-full” style={{background:‘rgba(255,255,255,0.18)’}}>
{realBalance >= 0 ? ‘+’ : ‘’}{realBalance.toFixed(0)} ₽
</span>
</div>
</div>

// ─── TRACKER TAB ───
function TrackerTab({ state, date, setDate, prices, setLog, realBalance }) {
const today = getToday();
const monday = getMonday(date);
const weekDates = Array.from({length:7}, (_,i) => addDays(monday, i));
const dayLabels = [‘Пн’,‘Вт’,‘Ср’,‘Чт’,‘Пт’,‘Сб’,‘Вс’];

const orderedHabits = useMemo(() => {
const parents = state.habits.filter(h => !h.parentId).sort((a,b) => a.order - b.order);
const result = [];
parents.forEach(p => {
result.push(p);
state.habits.filter(h => h.parentId === p.id).sort((a,b) => a.order - b.order).forEach(c => result.push(c));
});
// orphan children (parent deleted)
state.habits.filter(h => h.parentId && !state.habits.find(p => p.id === h.parentId)).forEach(h => result.push(h));
return result;
}, [state.habits]);

return (
<div className="flex flex-col h-full">
{/* Date Nav */}
<div className="flex items-center justify-between px-3 py-1 bg-white border-b border-gray-100 shrink-0">

{date === today ? ‘Сегодня’ : ‘’} {formatDate(date)}

function HabitRow({ habit, date, weekDates, dayLabels, log, prices, setLog }) {
const isChild = !!habit.parentId;
const status = log[`${habit.id}_${date}`] || null;
const price = prices[habit.id] || 0;

// Streak up to current date
const streak = useMemo(() => {
if (status === ‘done’) return calcStreak(habit.id, log, date);
// If not done today, count streak up to yesterday
return calcStreak(habit.id, log, addDays(date, -1));
}, [habit.id, log, date, status]);

const bonus = calcStreakBonus(status === ‘done’ ? streak : streak);
const earned = Math.round(price * (1 + bonus) * 100) / 100;
const penalty = Math.round(price * 3 * 100) / 100;

const bg = status === ‘done’ ? ‘bg-emerald-50 border-emerald-200’ : status === ‘miss’ ? ‘bg-red-50 border-red-200’ : ‘bg-white border-gray-100’;

return (
<div className={`fade-in rounded-lg border mb-1 ${bg} ${isChild ? 'ml-5' : ''}`}>
<div className="px-2 py-1">
{/* Top line: name + streak + prices */}
<div className="flex items-center gap-1">
{isChild && <Icon name="corner-down-right" size={11} color="#a5b4fc" className="shrink-0 -ml-0.5"/>}
<span className="text-[11px] font-bold text-gray-800 truncate flex-1 leading-tight">{habit.name}</span>
{streak > 0 && (
<span className="flex items-center gap-0.5 text-[9px] font-bold text-orange-500 shrink-0">
<Icon name="flame" size={10} color="#f97316"/>{streak}д
</span>
)}
<span className="mono text-[9px] font-semibold text-emerald-600 shrink-0">+{earned.toFixed(0)}₽</span>
{bonus > 0 && <span className="text-[8px] text-emerald-500 font-bold shrink-0">+{Math.round(bonus*100)}%</span>}
<span className="mono text-[9px] font-semibold text-red-400 shrink-0">-{penalty.toFixed(0)}₽</span>
</div>

function ShopTab({ state, setState, realBalance, purchaseItem }) {
const [name, setName] = useState(’’);
const [price, setPrice] = useState(’’);

const addItem = () => {
if (!name.trim() || !price) return;
setState(prev => ({
…prev,
shop: […prev.shop, { id: uid(), name: name.trim(), price: parseFloat(price), bought: false }]
}));
setName(’’); setPrice(’’);
};

const removeItem = (id) => {
setState(prev => ({ …prev, shop: prev.shop.filter(i => i.id !== id) }));
};

const active = state.shop.filter(i => !i.bought);
const bought = state.shop.filter(i => i.bought);

return (
<div className="flex flex-col h-full">

<div className={`mono text-3xl font-bold ${realBalance >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>
{realBalance.toFixed(0)} ₽
</div>
</div>

function SettingsTab({ state, setState }) {
const [newHabit, setNewHabit] = useState(’’);
const [subParent, setSubParent] = useState(’’);
const [newSub, setNewSub] = useState(’’);
const [editId, setEditId] = useState(null);
const [editPrice, setEditPrice] = useState(’’);

const parents = state.habits.filter(h => !h.parentId);

const addHabit = () => {
if (!newHabit.trim()) return;
setState(prev => ({
…prev,
habits: […prev.habits, { id: uid(), name: newHabit.trim(), parentId: null, customPrice: null, order: prev.habits.length }]
}));
setNewHabit(’’);
};

const addSubHabit = () => {
if (!newSub.trim() || !subParent) return;
setState(prev => ({
…prev,
habits: […prev.habits, { id: uid(), name: newSub.trim(), parentId: subParent, customPrice: null, order: prev.habits.length }]
}));
setNewSub(’’);
};

const deleteHabit = (id) => {
setState(prev => ({
…prev,
habits: prev.habits.filter(h => h.id !== id && h.parentId !== id)
}));
};

const savePrice = (id) => {
const val = editPrice.trim() === ‘’ ? null : parseFloat(editPrice);
setState(prev => ({
…prev,
habits: prev.habits.map(h => h.id === id ? { …h, customPrice: val } : h)
}));
setEditId(null); setEditPrice(’’);
};

const resetHistory = () => {
if (confirm(‘Удалить ВСЮ историю отметок? Баланс сбросится к 0.’)) {
setState(prev => ({ …prev, log: {}, shop: prev.shop.map(s => ({ …s, bought: false })) }));
}
};

const basePrice = state.habits.length > 0 ? (state.budget / (state.habits.length * 7)) : 0;

return (
<div className="flex-1 scroll-area px-3 py-2 h-full">
{/* Budget */}
<div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Бюджет на выходные</div>
<div className="flex gap-2 mb-3">
<input type=“number” value={state.budget} onChange={e => setState(prev => ({ …prev, budget: parseFloat(e.target.value) || 0 }))}
className=“flex-1 mono text-sm font-bold px-3 py-2 rounded-lg border border-gray-200 bg-white focus:outline-none focus:border-brand-500”/>
<span className="flex items-center text-xs text-gray-400 font-semibold">₽</span>
</div>
<div className="text-[9px] text-gray-400 mb-3">
Базовая цена привычки: <span className="mono font-bold text-gray-600">{basePrice.toFixed(1)} ₽</span> ({state.habits.length} привычек × 7 дней)
</div>

```
  {/* Add main habit */}
  <div className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Добавить привычку</div>
  <div className="flex gap-2 mb-2">
    <input value={newHabit} onChange={e => setNewHabit(e.target.value)} placeholder="Название..."
      className="flex-1 text-xs px-2.5 py-2 rounded-lg border border-gray-200 bg-white focus:outline-none focus:border-brand-500"/>
    <button onClick={addHabit} className="btn-press px-3 py-2 rounded-lg bg-brand-600 text-white active:bg-brand-700">
      <Icon name="plus" size={14} color="white"/>

  </button>
